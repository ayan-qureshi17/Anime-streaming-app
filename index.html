<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#E8A44A;--g2:#F5C57A;--g3:#C4832A;--teal:#3AAFA9;
  --bg:#080B0F;--bg2:#0D1117;--bg3:#131920;
  --fg:#F2F2F0;--fg2:#9BA8B5;--fg3:#56636F;
  --bd:#1E2A38;--bd2:#263040;
  --r:8px;--r2:4px;--tr:all .25s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;transition:var(--tr);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}
.page{display:none;min-height:100vh;}.page.active{display:block;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:300;height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,11,15,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(232,164,74,.12);}
.nlogo{height:42px;width:auto;cursor:pointer;filter:drop-shadow(0 0 6px rgba(232,164,74,.25));transition:var(--tr);}
.nlogo:hover{filter:drop-shadow(0 0 14px rgba(232,164,74,.5));transform:scale(1.04);}
.nlinks{display:flex;gap:4px;flex:1;justify-content:center;}
.nl{padding:6px 14px;border-radius:var(--r2);color:var(--fg2);font-size:13px;font-weight:500;cursor:pointer;transition:var(--tr);}
.nl:hover,.nl.act{color:var(--g);background:rgba(232,164,74,.1);}
.navr{display:flex;gap:8px;align-items:center;}
.nib{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);color:var(--fg2);}
.nib:hover{border-color:var(--g);color:var(--g);}
.nib img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* SEARCH */
.sov{position:fixed;inset:0;background:rgba(8,11,15,.97);backdrop-filter:blur(20px);z-index:500;display:none;flex-direction:column;align-items:center;padding-top:100px;gap:12px;}
.sov.open{display:flex;}
.sbox{width:min(640px,92vw);position:relative;}
.sinp{width:100%;background:var(--bg3);border:2px solid var(--bd2);border-radius:var(--r);padding:16px 50px 16px 20px;color:var(--fg);font-size:18px;font-family:'Outfit',sans-serif;font-weight:500;outline:none;transition:border-color .3s;}
.sinp:focus{border-color:var(--g);}
.sinp::placeholder{color:var(--fg3);}
.scls{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg3);font-size:20px;cursor:pointer;}
.slist{width:min(640px,92vw);max-height:54vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.sitem{display:flex;gap:14px;align-items:center;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;cursor:pointer;transition:var(--tr);}
.sitem:hover{border-color:var(--g);}
.sitem img{width:42px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bd);}
.sii h4{font-size:14px;font-weight:600;margin-bottom:3px;}
.sii p{font-size:11px;color:var(--fg2);}

/* HERO */
.hero{position:relative;height:calc(100vh - 58px);overflow:hidden;display:flex;align-items:flex-end;padding-bottom:80px;margin-top:58px;}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center 15%;transition:background-image .8s;}
.hbg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,11,15,.97) 25%,rgba(8,11,15,.6) 55%,transparent 100%),linear-gradient(to top,rgba(8,11,15,1) 0%,rgba(8,11,15,.7) 25%,transparent 55%);}
.hc{position:relative;z-index:2;padding:0 32px;max-width:640px;}
.hbadge{display:inline-flex;align-items:center;gap:8px;padding:5px 14px;border-radius:100px;background:rgba(232,164,74,.12);border:1px solid rgba(232,164,74,.35);color:var(--g);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px;}
.hpulse{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:.4;}}
.hero h1{font-size:clamp(3rem,7vw,6.5rem);line-height:.95;margin-bottom:14px;}
.hero h1 em{font-style:normal;color:var(--g);}
.hero p{font-size:.95rem;color:var(--fg2);margin-bottom:22px;max-width:460px;line-height:1.72;}
.hmeta{display:flex;gap:16px;margin-bottom:28px;font-size:12px;color:var(--fg2);flex-wrap:wrap;}
.hbtns{display:flex;gap:12px;flex-wrap:wrap;}
.bp{background:linear-gradient(135deg,var(--g),var(--g3));color:#0a0a0a;padding:13px 32px;border-radius:var(--r);font-size:14px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,164,74,.4);}
.bo{background:rgba(255,255,255,.06);color:var(--fg);border:1px solid rgba(255,255,255,.15);padding:13px 28px;border-radius:var(--r);font-size:14px;font-weight:600;}
.bo:hover{background:rgba(255,255,255,.12);}
.hinds{position:absolute;bottom:32px;right:32px;z-index:3;display:flex;gap:6px;}
.hind{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,.18);border:none;cursor:pointer;transition:var(--tr);}
.hind.act{background:var(--g);width:36px;}

/* SECTIONS */
.sec{padding:3rem 24px;border-top:1px solid rgba(255,255,255,.05);}
.sechdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.sechdr h2{font-size:1.75rem;letter-spacing:.08em;}
.seea{font-size:12px;color:var(--g);cursor:pointer;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.seea:hover{color:var(--g2);}
.crw{position:relative;}
.cr{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none;}
.cr::-webkit-scrollbar{display:none;}
.crb{position:absolute;top:36%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(13,17,23,.95);border:1px solid var(--bd2);color:var(--fg);font-size:17px;z-index:5;display:none;align-items:center;justify-content:center;transition:var(--tr);}
.crw:hover .crb{display:flex;}
.crb:hover{background:var(--g);color:#000;border-color:var(--g);}
.crb.lf{left:-17px;}.crb.rt{right:-17px;}

/* ANIME CARD */
.ac{flex:0 0 158px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--tr);position:relative;}
.ac:hover{transform:translateY(-6px) scale(1.02);border-color:var(--g);box-shadow:0 16px 40px rgba(0,0,0,.5);}
.aci{position:relative;overflow:hidden;}
.acimg{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--bd);display:block;transition:transform .4s;}
.ac:hover .acimg{transform:scale(1.06);}
.acov{position:absolute;inset:0;background:rgba(8,11,15,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--tr);}
.ac:hover .acov{opacity:1;}
.playc{width:46px;height:46px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;font-weight:800;}
.acbg{position:absolute;top:8px;right:8px;background:rgba(8,11,15,.85);color:var(--g);font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid rgba(232,164,74,.3);}
.acb{padding:10px;}
.act2{font-size:11.5px;font-weight:600;line-height:1.35;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.acm{display:flex;justify-content:space-between;font-size:10px;color:var(--fg3);}

/* BROWSE */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px;margin-bottom:22px;}
.gbtn{padding:9px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);text-align:center;font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr);display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--fg2);}
.gbtn:hover,.gbtn.act{background:rgba(232,164,74,.1);border-color:rgba(232,164,74,.4);color:var(--g);}
.gbtn span{font-size:20px;}
.sbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;}
.sb{padding:6px 16px;border-radius:100px;border:1px solid var(--bd);background:var(--bg3);font-size:11px;font-weight:600;color:var(--fg2);cursor:pointer;transition:var(--tr);}
.sb:hover,.sb.act{background:rgba(232,164,74,.12);border-color:var(--g);color:var(--g);}
.catg{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:16px;}
.lmb{display:block;margin:32px auto 0;padding:12px 32px;background:transparent;border:1px solid var(--bd2);color:var(--fg2);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);}
.lmb:hover{border-color:var(--g);color:var(--g);}

/* DETAIL */
.dh{position:relative;height:420px;overflow:hidden;}
.dbg{position:absolute;inset:0;background-size:cover;background-position:center 20%;}
.dbg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,11,15,.1),rgba(8,11,15,.75) 55%,rgba(8,11,15,1) 100%);}
.dhdr{position:absolute;bottom:0;left:0;right:0;padding:24px;display:flex;gap:22px;align-items:flex-end;}
.dposter{width:138px;height:206px;border-radius:var(--r);object-fit:cover;flex-shrink:0;border:2px solid rgba(232,164,74,.25);box-shadow:0 16px 40px rgba(0,0,0,.8);background:var(--bd);}
.dinfo h1{font-size:clamp(1.6rem,5vw,3rem);margin-bottom:10px;line-height:1.05;}
.dtgs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.dtag{padding:3px 11px;border-radius:100px;background:rgba(255,255,255,.07);border:1px solid var(--bd2);font-size:10px;font-weight:600;}
.dtag.hi{background:rgba(232,164,74,.15);border-color:rgba(232,164,74,.4);color:var(--g);}
.dsts{display:flex;gap:16px;font-size:12px;color:var(--fg2);flex-wrap:wrap;}
.dsts strong{color:var(--fg);}
.dbody{padding:22px;}
.ddesc{font-size:14px;color:var(--fg2);line-height:1.78;margin-bottom:24px;}
.dbtns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.epsec h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.06em;margin-bottom:14px;}
.eptb{display:flex;gap:6px;margin-bottom:14px;}
.etb{padding:6px 18px;border-radius:100px;border:1px solid var(--bd);background:var(--bg3);font-size:11px;font-weight:700;color:var(--fg2);cursor:pointer;transition:var(--tr);}
.etb.act{background:rgba(232,164,74,.15);border-color:var(--g);color:var(--g);}
.epg{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:6px;max-height:280px;overflow-y:auto;padding-right:4px;}
.epb{aspect-ratio:1;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--bd);font-size:12px;font-weight:700;color:var(--fg2);cursor:pointer;transition:var(--tr);}
.epb:hover{background:rgba(232,164,74,.12);border-color:var(--g);color:var(--g);}
.epb.act{background:linear-gradient(135deg,var(--g),var(--g3));color:#000;border-color:transparent;}

/* WATCH */
.wp{margin-top:58px;display:grid;grid-template-columns:1fr 310px;min-height:calc(100vh - 58px);}
.wl{display:flex;flex-direction:column;background:#000;}
.ps{position:relative;width:100%;padding-top:56.25%;background:#000;flex-shrink:0;overflow:hidden;}
.ps>*{position:absolute;top:0;left:0;width:100%;height:100%;}
.ps video{border:none;background:#000;display:block;}

/* Player overlay */
.pov{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px;background:var(--bg);z-index:20;}
.pov.hidden{display:none!important;}
.pov h3{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;}
.pov p{font-size:13px;color:var(--fg2);max-width:300px;line-height:1.65;}
.pov small{font-size:11px;color:var(--fg3);}
/* Server status grid */
.srv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;width:100%;max-width:320px;margin-top:4px;}
.srv-btn{padding:10px 4px;border-radius:var(--r2);border:1px solid var(--bd2);background:var(--bg3);color:var(--fg2);font-size:11px;font-weight:600;cursor:pointer;transition:var(--tr);line-height:1.3;}
.srv-btn:hover{border-color:var(--g);color:var(--g);background:rgba(232,164,74,.08);}
.srv-btn.trying{border-color:var(--g);color:var(--g);animation:blink .9s infinite;}
.srv-btn.ok{background:rgba(74,222,128,.12);border-color:#4ade80;color:#4ade80;}
.srv-btn.fail{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3);color:#f87171;opacity:.6;}
.srv-btn.active{background:var(--g);color:#000;border-color:var(--g);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.srv-label{font-size:9px;display:block;opacity:.55;margin-top:2px;}

/* Video controls overlay */
.vct{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);padding:36px 16px 14px;opacity:0;transition:opacity .3s;z-index:5;pointer-events:none;}
.ps:hover .vct,.ps.paused .vct{opacity:1;pointer-events:all;}
.pbar{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.18);position:relative;cursor:pointer;margin-bottom:12px;transition:height .15s;}
.pbar:hover{height:5px;}
.pbuf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.14);border-radius:2px;}
.pfil{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--g),var(--g2));border-radius:2px;width:0%;}
.ctr{display:flex;align-items:center;gap:8px;}
.cb{width:32px;height:32px;border-radius:6px;background:none;border:none;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--tr);}
.cb:hover{background:rgba(255,255,255,.12);}
.cb.big{width:40px;height:40px;font-size:20px;}
.ttxt{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;white-space:nowrap;}
.fsp{flex:1;}
.vr{display:flex;align-items:center;gap:6px;}
.vsl{width:68px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;outline:none;}
.vsl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--g);cursor:pointer;}

/* Watch sidebar */
.winfo{padding:14px 18px;background:var(--bg2);border-top:1px solid var(--bd);flex-shrink:0;}
.winfo h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.05em;margin-bottom:3px;}
.winfo p{font-size:11px;color:var(--fg2);}
.wside{border-left:1px solid var(--bd);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;}
.wsh{padding:12px 16px 10px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.wsh h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.05em;}
.epl{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;}
.epr{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:var(--tr);border:1px solid transparent;}
.epr:hover{background:rgba(255,255,255,.04);border-color:var(--bd);}
.epr.act{background:rgba(232,164,74,.08);border-color:rgba(232,164,74,.3);}
.epn{width:30px;height:30px;border-radius:5px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.epr.act .epn{background:linear-gradient(135deg,var(--g),var(--g3));color:#000;}
.epi h4{font-size:11px;font-weight:600;margin-bottom:1px;}
.epi p{font-size:10px;color:var(--fg3);}
.wsct{padding:10px 14px;border-top:1px solid var(--bd);display:flex;gap:7px;flex-shrink:0;}
.wb{flex:1;padding:9px;border-radius:var(--r2);background:rgba(255,255,255,.04);border:1px solid var(--bd);color:var(--fg2);font-size:11px;font-weight:600;cursor:pointer;transition:var(--tr);}
.wb:hover{background:rgba(255,255,255,.08);color:var(--fg);}
.wb.hi{background:rgba(232,164,74,.12);border-color:rgba(232,164,74,.3);color:var(--g);}

.sk{background:linear-gradient(90deg,#0d1117 25%,#1a2232 50%,#0d1117 75%);background-size:200% 100%;animation:shim 1.5s infinite;border-radius:6px;}
@keyframes shim{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 18px;font-size:12px;font-weight:500;max-width:290px;line-height:1.45;backdrop-filter:blur(12px);transform:translateY(12px);opacity:0;transition:all .3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(232,164,74,.5);color:var(--g);}
.toast.err{border-color:rgba(232,69,60,.4);color:#f87171;}
.toast.info{border-color:rgba(58,175,169,.4);color:var(--teal);}
.spin{width:32px;height:32px;border:3px solid rgba(232,164,74,.12);border-top-color:var(--g);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg);}}
footer{background:var(--bg2);border-top:1px solid var(--bd);padding:2.5rem 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
footer img{height:36px;opacity:.55;}
footer p{font-size:12px;color:var(--fg3);}
@media(max-width:880px){
  .nlinks .nl:nth-child(n+2){display:none;}
  .wp{grid-template-columns:1fr;}
  .wside{border-left:none;border-top:1px solid var(--bd);max-height:300px;}
  .hc,.sec,.dbody{padding-left:16px;padding-right:16px;}
}
</style>
</head>

      </div>
      <div class="epl" id="EPL"></div>
      <div class="wsct">
        <button class="wb"    onclick="pe()">← PREV</button>
        <button class="wb hi" onclick="ne()">NEXT →</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// COLACO FRONTEND v9  —  Uses our own backend at /api/* and /proxy
// ════════════════════════════════════════════════════════════════

const AL = 'https://graphql.anilist.co';

const Q_T    = 'query($p:Int,$pp:Int,$s:MediaSeason,$y:Int){Page(page:$p,perPage:$pp){media(type:ANIME,sort:TRENDING_DESC,season:$s,seasonYear:$y,status_not:NOT_YET_RELEASED){id idMal title{romaji english}coverImage{large extraLarge}bannerImage episodes status genres averageScore format description(asHtml:false)}}}';
const Q_TOP  = 'query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){media(type:ANIME,sort:SCORE_DESC,status_not:NOT_YET_RELEASED){id idMal title{romaji english}coverImage{large}bannerImage episodes status genres averageScore format}}}';
const Q_MOV  = 'query($p:Int,$pp:Int){Page(page:$p,perPage:$pp){media(type:ANIME,format:MOVIE,sort:POPULARITY_DESC,status_not:NOT_YET_RELEASED){id idMal title{romaji english}coverImage{large}bannerImage episodes averageScore genres format}}}';
const Q_AIR  = 'query($p:Int,$pp:Int,$s:MediaSeason,$y:Int){Page(page:$p,perPage:$pp){media(type:ANIME,sort:POPULARITY_DESC,season:$s,seasonYear:$y,status:RELEASING){id idMal title{romaji english}coverImage{large}episodes averageScore genres format}}}';
const Q_SRC  = 'query($q:String){Page(page:1,perPage:16){media(type:ANIME,search:$q,sort:SEARCH_MATCH){id idMal title{romaji english}coverImage{large}episodes averageScore genres format}}}';
const Q_INFO = 'query($id:Int){Media(id:$id,type:ANIME){id idMal title{romaji english}coverImage{large extraLarge}bannerImage description(asHtml:false)episodes status genres averageScore format duration startDate{year}studios{nodes{name}}}}';
const Q_BROW = 'query($p:Int,$pp:Int,$sort:MediaSort,$genre:String,$format:MediaFormat){Page(page:$p,perPage:$pp){pageInfo{hasNextPage}media(type:ANIME,sort:[$sort],genre:$genre,format:$format,status_not:NOT_YET_RELEASED){id idMal title{romaji english}coverImage{large}episodes averageScore genres format}}}';

// ── State ────────────────────────────────────────────────────────
const S = {
  pg:'home', anime:null, alId:null, malId:null,
  eps:[], ei:0, type:'sub',
  gogoId:null, gogoDub:null,
  awId:null, awEps:[],
  hlsObj:null,
  hl:[], hi:0, htmr:null,
  bs:'TRENDING_DESC', bp:1, bg:null,
  stk:[],
};
const C={}, GOC={}, AWC={};

// Servers to try in order
const SRVS = [
  {id:'aniwatch-vidstreaming', label:'HiAnime 1',  cat:'aw',  srv:'vidstreaming'},
  {id:'aniwatch-megacloud',    label:'HiAnime 2',  cat:'aw',  srv:'megacloud'},
  {id:'aniwatch-streamsb',     label:'HiAnime 3',  cat:'aw',  srv:'streamsb'},
  {id:'gogo-gogocdn',          label:'Gogo 1',     cat:'gogo',srv:'gogocdn'},
  {id:'gogo-streamsb',         label:'Gogo 2',     cat:'gogo',srv:'streamsb'},
  {id:'gogo-vidcdn',           label:'Gogo 3',     cat:'gogo',srv:'vidcdn'},
];
const STATUS = {}; // srvIdx → 'trying'|'ok'|'fail'

// ── AniList ──────────────────────────────────────────────────────
async function al(q,v={}) {
  const r = await fetch(AL,{method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({query:q,variables:v})});
  if(!r.ok) throw new Error('AL '+r.status);
  return r.json();
}

// ── Our backend ──────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error('API '+r.status+' '+path);
  return r.json();
}

// ── Helpers ──────────────────────────────────────────────────────
const sn = () => { const m=new Date().getMonth(); return m<3?'WINTER':m<6?'SPRING':m<9?'SUMMER':'FALL'; };
const Ti = a => a?.title?.english||a?.title?.romaji||'';
const nh = h => (h||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'");
const ft = s => { if(!s||isNaN(s))return'0:00'; const m=Math.floor(s/60),x=Math.floor(s%60); return m+':'+(x<10?'0':'')+x; };
const bm = (arr,t,k) => { const tl=t.toLowerCase(); return arr.find(x=>(x[k]||'').toLowerCase()===tl)||arr.find(x=>(x[k]||'').toLowerCase().includes(tl.slice(0,8)))||arr[0]; };
function skc(el,n=10){ el.innerHTML=Array.from({length:n},()=>'<div class="ac"><div class="sk" style="width:100%;aspect-ratio:2/3;border-radius:8px 8px 0 0;"></div><div style="padding:10px;display:flex;flex-direction:column;gap:7px;"><div class="sk" style="height:12px;width:82%;"></div><div class="sk" style="height:10px;width:50%;"></div></div></div>').join(''); }

function card(a) {
  const t=Ti(a), s=a.averageScore?(a.averageScore/10).toFixed(1):'?';
  return `<div class="ac" onclick="det(${a.id})">
    <div class="aci">
      <img class="acimg" src="${a.coverImage.large}" alt="${t}" loading="lazy" onerror="this.style.background='#1a2232'"/>
      ${a.episodes?`<div class="acbg">${a.episodes}EP</div>`:''}
      <div class="acov"><div class="playc">▶</div></div>
    </div>
    <div class="acb">
      <div class="act2">${t}</div>
      <div class="acm"><span>⭐${s}</span><span>${a.genres?.[0]||''}</span></div>
    </div>
  </div>`;
}
function sc(id,d){ const c=document.getElementById(id); if(c) c.scrollBy({left:d*580,behavior:'smooth'}); }

// ── HOME ─────────────────────────────────────────────────────────
async function homeLoad() {
  ['C1','C2','C3','C4'].forEach(id=>skc(document.getElementById(id),10));
  try {
    const yr=new Date().getFullYear(), ss=sn();
    const [r1,r2,r3,r4] = await Promise.all([
      al(Q_T,{p:1,pp:16,s:ss,y:yr}),
      al(Q_TOP,{p:1,pp:12}),
      al(Q_MOV,{p:1,pp:10}),
      al(Q_AIR,{p:1,pp:12,s:ss,y:yr}),
    ]);
    const [t,top,mov,air] = [r1,r2,r3,r4].map(r=>r.data.Page.media);
    [...t,...top,...mov,...air].forEach(x=>C[x.id]=x);
    ['C1','C2','C3','C4'].forEach((id,i)=>
      document.getElementById(id).innerHTML=[t,top,mov,air][i].map(card).join(''));
    S.hl = t.filter(x=>x.bannerImage).slice(0,6);
    if(S.hl.length){
      sh(0);
      if(S.htmr) clearInterval(S.htmr);
      S.htmr = setInterval(()=>sh((S.hi+1)%S.hl.length), 7000);
    }
  } catch(e) {
    document.getElementById('C1').innerHTML =
      '<p style="color:var(--fg2);padding:20px;grid-column:1/-1">Failed to load. Check connection.</p>';
  }
}

function sh(i) {
  S.hi=i; const a=S.hl[i]; if(!a) return;
  document.getElementById('HBG').style.backgroundImage=`url('${a.bannerImage||a.coverImage.extraLarge}')`;
  document.getElementById('HT').innerHTML=`<em>${Ti(a)}</em>`;
  document.getElementById('HD').textContent=nh(a.description||'').slice(0,165)+'…';
  document.getElementById('HM').innerHTML=
    `${a.averageScore?`<span>⭐ ${(a.averageScore/10).toFixed(1)}</span>`:''}`+
    `<span>📺 ${a.episodes||'?'} EPS</span>`+
    `${a.genres?.[0]?`<span>🎭 ${a.genres[0].toUpperCase()}</span>`:''}`;
  document.getElementById('HW').onclick=()=>det(a.id,true);
  document.getElementById('HI').onclick=()=>det(a.id);
  document.getElementById('HINDS').innerHTML=S.hl.map((_,j)=>
    `<button class="hind ${j===i?'act':''}" onclick="sh(${j});clearInterval(S.htmr)"></button>`).join('');
}

// ── BROWSE ───────────────────────────────────────────────────────
const GENRES=[['Action','⚔️'],['Adventure','🗺️'],['Comedy','😂'],['Drama','😢'],['Fantasy','🐉'],['Horror','👻'],['Mystery','🔍'],['Romance','💕'],['Sci-Fi','🚀'],['Slice of Life','🌸'],['Sports','⚽'],['Supernatural','✨'],['Thriller','😰'],['Mecha','🤖'],['Music','🎵'],['Isekai','🌍'],['Shounen','💪'],['Seinen','🎯']];
const SORTS=[['TRENDING_DESC','Trending'],['SCORE_DESC','Top Rated'],['POPULARITY_DESC','Popular'],['START_DATE_DESC','Newest']];

function loadBrowse() {
  document.getElementById('GG').innerHTML=GENRES.map(([g,ic])=>
    `<div class="gbtn ${S.bg===g?'act':''}" onclick="sbg('${g}',this)"><span>${ic}</span>${g}</div>`).join('');
  document.getElementById('SBAR').innerHTML=SORTS.map(([k,l])=>
    `<button class="sb ${S.bs===k?'act':''}" onclick="sbs('${k}',this)">${l}</button>`).join('');
  S.bp=1; lcat(true);
}

async function lcat(r) {
  const el=document.getElementById('CATG');
  if(r) skc(el,24);
  try {
    const v={p:S.bp,pp:24,sort:S.bs}; if(S.bg) v.genre=S.bg;
    const res=await al(Q_BROW,v), items=res.data.Page.media;
    items.forEach(x=>C[x.id]=x);
    if(r) el.innerHTML=items.map(card).join('');
    else   el.innerHTML+=items.map(card).join('');
    document.getElementById('LMB').style.display=
      res.data.Page.pageInfo.hasNextPage?'block':'none';
  } catch(e) {
    el.innerHTML='<p style="color:var(--fg2);padding:16px;grid-column:1/-1">Failed to load.</p>';
  }
}

function sbs(s,b){ S.bs=s; S.bp=1; document.querySelectorAll('.sb').forEach(x=>x.classList.remove('act')); b.classList.add('act'); lcat(true); }
function sbg(g,el){ S.bg=S.bg===g?null:g; document.querySelectorAll('.gbtn').forEach(x=>x.classList.remove('act')); if(S.bg) el.classList.add('act'); S.bp=1; lcat(true); }
function lm(){ S.bp++; lcat(false); }

// ── DETAIL ───────────────────────────────────────────────────────
async function det(id, autoWatch=false) {
  S.stk.push(S.pg); sp('detail');
  S.alId=id; S.malId=null; S.eps=[]; S.ei=0;
  S.awId=null; S.awEps=[]; S.gogoId=null; S.gogoDub=null;

  let a=C[id];
  if(!a||!a.description) {
    try { const r=await al(Q_INFO,{id}); a=r.data.Media; C[id]=a; } catch(e){}
  }
  if(!a) return;
  S.anime=a; S.malId=a.idMal||null;

  document.getElementById('DBG').style.backgroundImage=
    `url('${a.bannerImage||a.coverImage.extraLarge||a.coverImage.large}')`;
  document.getElementById('DPO').src=a.coverImage.large;
  document.getElementById('DTI').textContent=Ti(a);
  document.getElementById('DDC').textContent=nh(a.description||'').slice(0,480)+'…';
  document.getElementById('DTG').innerHTML=[
    a.format&&`<span class="dtag hi">${a.format}</span>`,
    a.status&&`<span class="dtag">${a.status.replace(/_/g,' ')}</span>`,
    ...(a.genres||[]).slice(0,4).map(g=>`<span class="dtag">${g}</span>`)
  ].filter(Boolean).join('');

  const stu=a.studios?.nodes?.[0]?.name||'';
  document.getElementById('DST').innerHTML=
    `${a.averageScore?`<span>⭐<strong>${(a.averageScore/10).toFixed(1)}</strong></span>`:''}`+
    `${a.episodes?`<span>📺<strong>${a.episodes} EPS</strong></span>`:''}`+
    `${a.duration?`<span>⏱<strong>${a.duration}M</strong></span>`:''}`+
    `${stu?`<span>🎬<strong>${stu}</strong></span>`:''}`;

  buildEpGrid(a, autoWatch);
}

function buildEpGrid(a, autoWatch) {
  const eg=document.getElementById('EPG'), wb=document.getElementById('DWB');
  S.eps = Array.from({length:a.episodes||1},(_,i)=>({number:i+1,id:null}));
  eg.innerHTML = S.eps.map((ep,i)=>
    `<button class="epb ${i===0?'act':''}" onclick="gw(${i})">${ep.number}</button>`).join('');
  wb.textContent='▶ WATCH EPISODE 1'; wb.onclick=()=>gw(0);
  fetchGogoIds(a).catch(()=>{});
  fetchAWIds(a).catch(()=>{});
  if(autoWatch) gw(0);
}

async function fetchGogoIds(a) {
  if(GOC[a.id]){ S.gogoId=GOC[a.id].s; S.gogoDub=GOC[a.id].d; return; }
  const d = await api(`/api/search?q=${encodeURIComponent(Ti(a))}`);
  const res=d.results||[];
  const s   = res.find(r=>!r.id?.endsWith('-dub')&&!/dub/i.test(r.title||''))||res[0];
  const dub = res.find(r=>r.id?.endsWith('-dub')||/dub/i.test(r.title||''));
  S.gogoId=s?.id||null; S.gogoDub=dub?.id||null;
  if(S.gogoId){ GOC[a.id]={s:S.gogoId,d:S.gogoDub};
    // Enrich episodes with real IDs
    const info=await api(`/api/info?id=${encodeURIComponent(S.gogoId)}`);
    const eps=info.episodes||[];
    S.eps=S.eps.map((ep,i)=>{ const ae=eps.find(e=>e.number===ep.number)||eps[i]; return{...ep,id:ae?.id||null}; });
  }
}

async function fetchAWIds(a) {
  let awId=AWC[a.id];
  if(!awId){
    const d=await api(`/api/aw/search?q=${encodeURIComponent(Ti(a))}`);
    const m=bm(d.animes||[],Ti(a),'name');
    if(m?.id){ awId=m.id; AWC[a.id]=awId; }
  }
  if(!awId) throw new Error('no aw id');
  S.awId=awId;
  const d=await api(`/api/aw/episodes?id=${encodeURIComponent(awId)}`);
  S.awEps=d.episodes||[];
}

function sty(t) {
  S.type=t;
  document.getElementById('SUBT').className='etb'+(t==='sub'?' act':'');
  document.getElementById('DUBT').className='etb'+(t==='dub'?' act':'');
  if(S.pg==='watch') startStream();
}

// ── WATCH ────────────────────────────────────────────────────────
function gw(idx) {
  if(!S.eps.length) return;
  S.ei=idx; S.stk.push(S.pg); sp('watch');
  document.getElementById('WTI').textContent=Ti(S.anime);
  document.getElementById('WEP').textContent=`Episode ${S.eps[idx].number}`;
  document.getElementById('WSN').textContent=Ti(S.anime);
  renderEL(idx);
  startStream();
}

function renderEL(ai) {
  document.getElementById('EPL').innerHTML=S.eps.map((ep,i)=>`
    <div class="epr ${i===ai?'act':''}" onclick="gw(${i})">
      <div class="epn">${ep.number}</div>
      <div class="epi"><h4>Episode ${ep.number}</h4><p>${S.anime?.format||'TV'}</p></div>
    </div>`).join('');
  setTimeout(()=>{ const x=document.querySelector('.epr.act'); if(x) x.scrollIntoView({behavior:'smooth',block:'nearest'}); },80);
}

function pe(){ if(S.ei>0) gw(S.ei-1); }
function ne(){ if(S.ei<S.eps.length-1) gw(S.ei+1); }

// ════════════════════════════════════════════════════════════════
// STREAM ENGINE — tries all 6 servers in order, plays first that works
// ════════════════════════════════════════════════════════════════
async function startStream() {
  clrPlayer();
  SRVS.forEach((_,i)=>STATUS[i]=null);
  setOv('FINDING STREAM','Searching all servers…','');
  renderSrvGrid(-1);

  const ep = S.eps[S.ei];

  for(let i=0; i<SRVS.length; i++){
    const srv = SRVS[i];
    STATUS[i]='trying'; renderSrvGrid(i);
    setOv('CONNECTING', srv.label+'…', `Server ${i+1} of ${SRVS.length}`);

    try {
      const proxiedUrl = srv.cat==='aw'
        ? await getAWStream(ep.number, S.type, srv.srv)
        : await getGogoStream(ep.number, S.type, srv.srv);

      if(proxiedUrl){
        STATUS[i]='ok'; renderSrvGrid(i);
        toast('▶ Playing via '+srv.label, 'ok');
        playHLS(proxiedUrl, i);
        return;
      }
    } catch(e){
      STATUS[i]='fail'; renderSrvGrid(i);
      continue;
    }
  }

  setOv('NO STREAM FOUND',
    'All servers searched. This episode may not be available yet.',
    'Try a different episode or come back later.');
  renderSrvGrid(-1);
}

async function getAWStream(epNum, type, server) {
  // Make sure we have AniWatch data
  if(!S.awId) await fetchAWIds(S.anime);
  if(!S.awEps.length){
    const d=await api(`/api/aw/episodes?id=${encodeURIComponent(S.awId)}`);
    S.awEps=d.episodes||[];
  }
  const ep = S.awEps.find(e=>e.number===epNum)||S.awEps[epNum-1];
  if(!ep?.episodeId) throw new Error('no ep id');

  const d = await api(`/api/aw/stream?id=${encodeURIComponent(ep.episodeId)}&server=${server}&type=${type}`);
  const src = (d.sources||[]).find(s=>s.isM3U8||s.url?.includes('.m3u8'));
  if(!src?.url) throw new Error('no m3u8');

  // Return proxied URL — backend handles CORS/headers
  const ref = encodeURIComponent('https://hianime.to');
  return `/proxy?url=${encodeURIComponent(src.url)}&ref=${ref}`;
}

async function getGogoStream(epNum, type, server) {
  if(!S.gogoId) await fetchGogoIds(S.anime);
  const gid = type==='dub'?(S.gogoDub||S.gogoId):S.gogoId;
  if(!gid) throw new Error('no gogo id');

  const epId = `${gid}-episode-${epNum}`;
  const d    = await api(`/api/stream?id=${encodeURIComponent(epId)}&server=${server}`);
  const best = (d.sources||[]).find(s=>s.quality==='1080p')
             ||(d.sources||[]).find(s=>s.quality==='720p')
             ||(d.sources||[]).find(s=>s.isM3U8)
             ||(d.sources||[])[0];
  if(!best?.url) throw new Error('no src');

  const ref = encodeURIComponent('https://gogoanime.bid');
  return `/proxy?url=${encodeURIComponent(best.url)}&ref=${ref}`;
}

// ── HLS PLAYER ────────────────────────────────────────────────────
function playHLS(proxiedUrl, srvIdx) {
  clrPlayer();
  const ps=document.getElementById('PS');
  const vid=document.createElement('video');
  vid.autoplay=true; vid.playsinline=true;
  ps.appendChild(vid);
  buildCtrl(vid);
  renderSrvGrid(srvIdx);

  if(window.Hls && Hls.isSupported()){
    const hls=new Hls({enableWorker:true, maxBufferLength:30});
    S.hlsObj=hls;
    hls.loadSource(proxiedUrl);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ vid.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (_,d)=>{
      if(d.fatal){
        hls.destroy(); S.hlsObj=null;
        toast('Stream error — trying next server','err');
        retryFrom(srvIdx+1);
      }
    });
  } else if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=proxiedUrl; vid.play().catch(()=>{});
  } else {
    toast('HLS not supported in your browser','err');
  }
}

async function retryFrom(i) {
  if(i>=SRVS.length){ setOv('ALL SERVERS FAILED','Cannot load stream. Try another episode.',''); return; }
  const srv=SRVS[i]; const ep=S.eps[S.ei];
  STATUS[i]='trying'; renderSrvGrid(i);
  setOv('RETRYING',srv.label+'…','');
  try{
    const url = srv.cat==='aw'
      ? await getAWStream(ep.number,S.type,srv.srv)
      : await getGogoStream(ep.number,S.type,srv.srv);
    if(url){ STATUS[i]='ok'; toast('▶ '+srv.label,'ok'); playHLS(url,i); }
  }catch(e){ STATUS[i]='fail'; renderSrvGrid(i); retryFrom(i+1); }
}

// ── Player UI helpers ─────────────────────────────────────────────
function clrPlayer(){
  if(S.hlsObj){try{S.hlsObj.destroy();}catch(e){} S.hlsObj=null;}
  const ps=document.getElementById('PS');
  [...ps.children].forEach(c=>{
    if(!c.classList.contains('pov')&&!c.classList.contains('vct')) c.remove();
  });
  showOv();
}
function showOv(){ const p=document.getElementById('POV'); if(p) p.classList.remove('hidden'); }
function hideOv(){ const p=document.getElementById('POV'); if(p) p.classList.add('hidden'); }
function setOv(h,p,s){
  document.getElementById('POV_H').textContent=h;
  document.getElementById('POV_P').textContent=p;
  document.getElementById('POV_S').textContent=s||'';
  const sp=document.getElementById('POV_SPIN');
  if(sp) sp.style.display=(h==='NO STREAM FOUND'||h==='ALL SERVERS FAILED')?'none':'block';
  showOv();
}
function renderSrvGrid(activeIdx){
  const g=document.getElementById('SRV'); if(!g) return;
  g.innerHTML=SRVS.map((srv,i)=>{
    const st=STATUS[i];
    let cls=st==='trying'?'trying':st==='ok'?'ok':st==='fail'?'fail':'';
    if(i===activeIdx&&st==='ok') cls='active';
    return `<button class="srv-btn ${cls}" onclick="jumpTo(${i})">
      ${srv.label}<span class="srv-label">${srv.cat.toUpperCase()}</span>
    </button>`;
  }).join('');
}
async function jumpTo(i){
  clrPlayer();
  const srv=SRVS[i], ep=S.eps[S.ei];
  STATUS[i]='trying'; renderSrvGrid(i);
  setOv('CONNECTING',srv.label+'…','');
  try{
    const url=srv.cat==='aw'
      ?await getAWStream(ep.number,S.type,srv.srv)
      :await getGogoStream(ep.number,S.type,srv.srv);
    if(url){STATUS[i]='ok';toast('▶ '+srv.label,'ok');playHLS(url,i);}
  }catch(e){STATUS[i]='fail';renderSrvGrid(i);toast(srv.label+' failed','err');}
}

function buildCtrl(vid){
  const ps=document.getElementById('PS');
  const ct=document.createElement('div'); ct.className='vct';
  ct.innerHTML=`
    <div class="pbar" id="PB">
      <div class="pbuf" id="PBF"></div>
      <div class="pfil" id="PFI"></div>
    </div>
    <div class="ctr">
      <button class="cb big" id="PBT" onclick="vpl()">⏸</button>
      <button class="cb" onclick="vsk(-10)">⏪</button>
      <button class="cb" onclick="vsk(10)">⏩</button>
      <div class="vr">
        <button class="cb" id="VB" onclick="vmt()">🔊</button>
        <input type="range" class="vsl" id="VSL" min="0" max="1" step="0.05" value="1" oninput="vvl(this.value)"/>
      </div>
      <span class="ttxt" id="TTX">0:00/0:00</span>
      <span class="fsp"></span>
      <button class="cb" onclick="vfs()">⛶</button>
    </div>`;
  ps.appendChild(ct);

  vid.addEventListener('timeupdate',()=>{
    const p=vid.duration?vid.currentTime/vid.duration*100:0;
    const pf=document.getElementById('PFI'), tt=document.getElementById('TTX');
    if(pf) pf.style.width=p+'%';
    if(tt) tt.textContent=ft(vid.currentTime)+'/'+ft(vid.duration);
  });
  vid.addEventListener('progress',()=>{
    if(vid.buffered.length){
      const p=vid.duration?vid.buffered.end(vid.buffered.length-1)/vid.duration*100:0;
      const b=document.getElementById('PBF'); if(b) b.style.width=p+'%';
    }
  });
  vid.addEventListener('play',  ()=>{ const b=document.getElementById('PBT'); if(b) b.textContent='⏸'; ps.classList.remove('paused'); hideOv(); });
  vid.addEventListener('pause', ()=>{ const b=document.getElementById('PBT'); if(b) b.textContent='▶';  ps.classList.add('paused'); });
  vid.addEventListener('ended', ()=>{ if(S.ei<S.eps.length-1) setTimeout(ne,1500); });
  document.getElementById('PB').addEventListener('click',e=>{
    const r=e.currentTarget.getBoundingClientRect();
    if(vid.duration) vid.currentTime=(e.clientX-r.left)/r.width*vid.duration;
  });
  ps.classList.add('paused');
}
function vpl(){ const v=document.querySelector('#PS video'); if(v) v.paused?v.play():v.pause(); }
function vsk(s){ const v=document.querySelector('#PS video'); if(v) v.currentTime=Math.max(0,Math.min(v.duration||0,v.currentTime+s)); }
function vmt(){ const v=document.querySelector('#PS video'),b=document.getElementById('VB'),sl=document.getElementById('VSL'); if(!v)return; v.muted=!v.muted; if(b) b.textContent=v.muted?'🔇':'🔊'; if(sl) sl.value=v.muted?0:v.volume; }
function vvl(val){ const v=document.querySelector('#PS video'); if(!v)return; v.volume=parseFloat(val); v.muted=val==0; const b=document.getElementById('VB'); if(b) b.textContent=val==0?'🔇':'🔊'; }
function vfs(){ const ps=document.getElementById('PS'); if(!document.fullscreenElement) ps.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }

// ── SEARCH ────────────────────────────────────────────────────────
document.getElementById('SBT').onclick=()=>{ document.getElementById('SOV').classList.add('open'); setTimeout(()=>document.getElementById('SINP').focus(),80); };
document.getElementById('SCLS').onclick=cs;
document.getElementById('SOV').addEventListener('click',e=>{ if(e.target===document.getElementById('SOV')) cs(); });
function cs(){ document.getElementById('SOV').classList.remove('open'); document.getElementById('SINP').value=''; document.getElementById('SLIST').innerHTML=''; }
let sT;
document.getElementById('SINP').addEventListener('input',e=>{ clearTimeout(sT); const q=e.target.value.trim(); if(!q){document.getElementById('SLIST').innerHTML='';return;} sT=setTimeout(()=>ds(q),380); });
document.getElementById('SINP').addEventListener('keydown',e=>{ if(e.key==='Escape') cs(); });
async function ds(q){
  const l=document.getElementById('SLIST');
  l.innerHTML='<div style="padding:14px;text-align:center;"><div class="spin" style="margin:0 auto;"></div></div>';
  try{
    const r=await al(Q_SRC,{q}); const res=r.data.Page.media;
    if(!res.length){l.innerHTML='<div style="padding:16px;text-align:center;color:var(--fg2)">No results.</div>';return;}
    res.forEach(x=>C[x.id]=x);
    l.innerHTML=res.map(a=>`<div class="sitem" onclick="cs();det(${a.id})"><img src="${a.coverImage.large}" alt=""/><div class="sii"><h4>${Ti(a)}</h4><p>${a.format||'TV'} · ${a.episodes?a.episodes+' eps':'Ongoing'} · ⭐ ${a.averageScore?(a.averageScore/10).toFixed(1):'?'}</p></div></div>`).join('');
  }catch(e){l.innerHTML='<div style="padding:16px;text-align:center;color:#f87171">Search failed.</div>';}
}

// ── PAGE NAV ─────────────────────────────────────────────────────
function sp(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+n).classList.add('active');
  document.querySelectorAll('.nl').forEach(l=>l.classList.remove('act'));
  const m={home:'home',browse:'browse',detail:'browse',watch:'browse'};
  document.querySelectorAll('[data-p]').forEach(l=>{ if(l.dataset.p===m[n]||l.dataset.p===n) l.classList.add('act'); });
  S.pg=n; window.scrollTo(0,0);
  if(n==='browse') loadBrowse();
  if(n!=='watch'&&S.hlsObj){ try{S.hlsObj.destroy();}catch(e){} S.hlsObj=null; }
}
function gp(pg,sub){
  if(sub==='tr') S.bs='TRENDING_DESC';
  else if(sub==='top') S.bs='SCORE_DESC';
  else if(sub==='mov') S.bs='POPULARITY_DESC';
  sp(pg);
}
function gb(){ const p=S.stk.pop(); if(p&&p!==S.pg) sp(p); else gp('home'); }

// ── TOAST ─────────────────────────────────────────────────────────
let tT;
function toast(msg,type='ok'){
  const t=document.getElementById('T');
  t.textContent=msg; t.className=`toast show ${type}`;
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),3500);
}

hs.src='https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js';
document.head.appendChild(hs);
homeLoad();
</script>
